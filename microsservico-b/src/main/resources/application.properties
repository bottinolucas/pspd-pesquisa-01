# в”Ђв”Ђв”Ђ gRPC (servidor consumido pelo gateway P) в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
quarkus.grpc.server.port=50052
quarkus.grpc.server.host=0.0.0.0
# Servidor HTTP do Quarkus (nao exposto) fora da porta padrao p/ evitar conflitos
quarkus.http.port=8081

# в”Ђв”Ђв”Ђ Elasticsearch в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
quarkus.elasticsearch.hosts=${ELASTICSEARCH_HOSTS:localhost:9200}
es.index=${ES_INDEX:livros}

# в”Ђв”Ђв”Ђ CDC / Debezium embarcado (Postgres -> Elasticsearch) в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
cdc.database.hostname=${DB_HOST:localhost}
cdc.database.port=${DB_PORT:5432}
cdc.database.user=${DB_USER:biblioteca}
cdc.database.password=${DB_PASSWORD:biblioteca}
cdc.database.dbname=${DB_NAME:biblioteca}
cdc.table.include=${CDC_TABLE_INCLUDE:catalogo.livros}
cdc.offset.file=${CDC_OFFSET_FILE:/data/offsets.dat}

quarkus.log.level=INFO
quarkus.log.category."io.debezium".level=INFO
